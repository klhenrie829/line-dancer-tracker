<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Line Dance Tracker</title>
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Line Dance" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-labelledby="app-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Line dance library</p>
            <h1 id="app-title">Keep every dance, song, count, and cue in one place.</h1>
          </div>
          <button class="button secondary" id="reset-samples" type="button">Restore starter list</button>
        </div>

        <section class="stats" aria-label="Progress summary">
          <article>
            <span id="stat-known">0</span>
            <p>Know</p>
          </article>
          <article>
            <span id="stat-learning">0</span>
            <p>Learning</p>
          </article>
          <article>
            <span id="stat-want">0</span>
            <p>Want to learn</p>
          </article>
          <article>
            <span id="stat-total">0</span>
            <p>Total dances</p>
          </article>
        </section>

        <section class="controls" aria-label="Filters">
          <label class="search">
            <span>Search</span>
            <input id="search" type="search" placeholder="Dance, song, level, tag..." autocomplete="off" />
          </label>
          <label>
            <span>Status</span>
            <select id="status-filter">
              <option value="all">All</option>
              <option value="know">Know</option>
              <option value="learning">Learning</option>
              <option value="want">Want to learn</option>
              <option value="none">Not started</option>
            </select>
          </label>
          <label>
            <span>Difficulty</span>
            <select id="difficulty-filter">
              <option value="all">All</option>
              <option value="Beginner">Beginner</option>
              <option value="Improver">Improver</option>
              <option value="Intermediate">Intermediate</option>
              <option value="Advanced">Advanced</option>
            </select>
          </label>
          <label class="toggle">
            <input id="show-cue-dances" type="checkbox" />
            <span>Only tags or restarts</span>
          </label>
        </section>

        <section class="dance-list" id="dance-list" aria-live="polite"></section>
      </section>

      <aside class="panel" aria-labelledby="form-title">
        <h2 id="form-title">Add a dance</h2>
        <form id="dance-form">
          <input type="hidden" id="dance-id" />
          <label>
            Dance name
            <input id="dance-name" name="name" required placeholder="Ex. Electric Slide" />
          </label>
          <label>
            Song or songs
            <textarea id="dance-songs" name="songs" rows="3" required placeholder="One per line, or separate with commas"></textarea>
          </label>
          <div class="form-row">
            <label>
              Counts
              <input id="dance-counts" name="counts" type="number" min="1" step="1" placeholder="32" />
            </label>
            <label>
              Difficulty
              <select id="dance-difficulty" name="difficulty">
                <option>Beginner</option>
                <option>Improver</option>
                <option>Intermediate</option>
                <option>Advanced</option>
              </select>
            </label>
          </div>
          <div class="form-row">
            <label>
              Tags
              <select id="dance-tags" name="tags">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Optional">Optional</option>
              </select>
            </label>
            <label>
              Restarts
              <select id="dance-restarts" name="restarts">
                <option value="No">No</option>
                <option value="Yes">Yes</option>
                <option value="Optional">Optional</option>
              </select>
            </label>
          </div>
          <label>
            Progress
            <select id="dance-status" name="status">
              <option value="none">Not started</option>
              <option value="want">Want to learn</option>
              <option value="learning">Currently learning</option>
              <option value="know">Know</option>
            </select>
          </label>
          <label>
            Notes
            <textarea id="dance-notes" name="notes" rows="3" placeholder="Walls, tricky steps, tag timing, restart wall..."></textarea>
          </label>
          <div class="form-actions">
            <button class="button" type="submit">Save dance</button>
            <button class="button secondary" id="cancel-edit" type="button" hidden>Cancel edit</button>
          </div>
        </form>

        <div class="data-tools">
          <h2>Your data</h2>
          <button class="button secondary" id="export-data" type="button">Export JSON</button>
          <label class="button secondary file-button">
            Import JSON
            <input id="import-data" type="file" accept="application/json" />
          </label>
          <p id="data-message" role="status"></p>
        </div>
      </aside>
    </main>

    <template id="dance-card-template">
      <article class="dance-card">
        <div class="card-head">
          <div>
            <p class="status-pill"></p>
            <h3></h3>
          </div>
          <select class="status-select" aria-label="Update progress">
            <option value="none">Not started</option>
            <option value="want">Want to learn</option>
            <option value="learning">Currently learning</option>
            <option value="know">Know</option>
          </select>
        </div>
        <p class="songs"></p>
        <dl class="details"></dl>
        <p class="notes"></p>
        <div class="card-actions">
          <button class="button secondary edit" type="button">Edit</button>
          <button class="button danger delete" type="button">Delete</button>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
